<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe - Site Internet</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Bienvenue sur le site de Safe</h1>
        <nav>
            <ul>

    <main>
        <section id="categories">
            <h2>Catégories</h2>
            <div class="category-grid">

                <div class="category">

                </div>
                <div class="category">
                    <a href="Bibliotheque/">

                    </a>

    </main>
    <footer>
        <p>&copy; 2025 Safe. Tous droits réservés.</p>

    <script src="/script.js"></script>
